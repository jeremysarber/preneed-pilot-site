<svg viewBox="70 40 840 245" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Preneed Pilot logo</title>
  <desc id="desc">Minimal geometric logo mark with two rising bands and the words Preneed Pilot.</desc>

  <!-- Symbol: stable base + subtle lift -->
  <g transform="translate(90,92)">
    <!-- bottom band -->
    <polygon points="0,148 278,110 263,164 4,172" fill="#2F6A34"/>
    <!-- top band -->
    <polygon points="68,108 308,49 294,94 83,126" fill="#BF9440"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(430,188)">
    <text x="0" y="0"
          font-family="Inter, Arial, Helvetica, sans-serif"
          font-size="72"
          font-weight="700"
          letter-spacing="-1.2"
          fill="#1E1E1E">Preneed </text>
    <text x="339" y="0"
          font-family="Inter, Arial, Helvetica, sans-serif"
          font-size="72"
          font-weight="700"
          letter-spacing="-1.2"
          fill="#BF9440">Pilot</text>
  </g>
</svg>
